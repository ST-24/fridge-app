<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1b4332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="冰箱管家">
<link rel="manifest" href="manifest.json">
<title>冰箱管家</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Microsoft JhengHei","PingFang TC",sans-serif;background:#e8edf2;display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:430px;background:#fff;min-height:100vh;position:relative;overflow-x:hidden}

.hd{background:linear-gradient(160deg,#1a392b 0%,#2d6a4f 50%,#52b788 100%);color:#fff;padding:18px 22px 16px;position:relative;overflow:hidden}
.hd::after{content:"";position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,0.06);border-radius:50%}
.hd1{font-size:10px;opacity:0.7;letter-spacing:2px;text-transform:uppercase}
.hd2{font-size:23px;font-weight:900;margin-top:4px;letter-spacing:1px}
.hd3{font-size:11px;opacity:0.75;margin-top:5px}

.tabs{display:flex;background:linear-gradient(180deg,#e8f5e9 0%,#f0faf1 100%);border-bottom:1px solid #c8e6c9}
.tab{flex:1;text-align:center;padding:12px 0;font-size:13.5px;font-weight:700;color:#6b9080;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s}
.tab.on{color:#1b4332;border-bottom-color:#2d6a4f;background:rgba(255,255,255,0.6)}

.legend{display:flex;justify-content:center;gap:14px;padding:8px 0 4px;font-size:11px;color:#777;background:#fafcfb}
.legend span{display:flex;align-items:center;gap:3px}
.legend i{width:9px;height:9px;border-radius:50%;display:inline-block}

.grid-wrap{padding:10px;display:none}
.grid-wrap.active{display:block}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:4px}
.cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;text-align:center;padding:4px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;word-break:break-all;line-height:1.25;min-height:70px}
.cell:active{transform:scale(0.93)}
.cell.empty{background:#f5f5f5;color:#bbb;border:2px dashed #ddd}
.cell.green{background:linear-gradient(135deg,#d8f3dc,#b7e4c7);color:#1b4332;border:2px solid #95d5b2}
.cell.yellow{background:linear-gradient(135deg,#fff3cd,#ffe69c);color:#664d03;border:2px solid #ffc107}
.cell.red{background:linear-gradient(135deg,#ffccd5,#ffa8b0);color:#900c20;border:2px solid #ef476f}
.cell .days-badge{position:absolute;top:-2px;right:-2px;font-size:9px;font-weight:800;padding:2px 5px;border-radius:8px;color:#fff;min-width:22px;text-align:center}
.cell.green .days-badge{background:#2d6a4f}
.cell.yellow .days-badge{background:#e67700}
.cell.red .days-badge{background:#c1121f}

.stats{display:flex;justify-content:center;gap:16px;padding:10px 0 6px;font-size:12px;color:#555;background:#fafcfb}
.stat{text-align:center}
.stat .num{font-size:22px;font-weight:900}
.stat .label{font-size:10px;color:#888;margin-top:1px}
.stat.safe .num{color:#2d6a4f}
.stat.warn .num{color:#e67700}
.stat.danger .num{color:#c1121f}
.stat.total .num{color:#555}

.footer-note{text-align:center;font-size:10px;color:#aaa;padding:8px 0 14px;background:#fafcfb}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:88%;max-width:340px;padding:24px 20px 20px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal h3{font-size:18px;margin-bottom:14px;color:#1b4332}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus{border-color:#52b788}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:11px 0;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,#2d6a4f,#52b788);color:#fff}
.btn-danger{background:linear-gradient(135deg,#c1121f,#ef476f);color:#fff}
.btn-cancel{background:#eee;color:#666}
.btn:active{opacity:0.8}

.fab{position:fixed;bottom:20px;right:50%;transform:translateX(215px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#2d6a4f,#52b788);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(45,106,79,0.35);cursor:pointer;z-index:100;border:none;outline:none}
.fab:active{transform:translateX(215px) scale(0.92)}

.loading{text-align:center;padding:40px 0;color:#999;font-size:13px}
.loading .spinner{width:36px;height:36px;border:4px solid #e0e0e0;border-top-color:#52b788;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* Grid Size Slider */
.size-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:#f8faf8;font-size:11px;color:#666}
.size-bar label{white-space:nowrap;font-weight:700;color:#555}
.size-bar input[type=range]{flex:1;accent-color:#2d6a4f;height:4px}
.size-bar .size-val{min-width:22px;text-align:center;font-weight:800;color:#2d6a4f}

/* Drag & Drop */
.cell.dragging{opacity:0.5;transform:scale(1.08);z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.cell.drag-over{border:3px dashed #2d6a4f;background:#e8f5e9!important}
.cell .drag-hint{position:absolute;top:2px;right:2px;font-size:9px;color:#aaa;pointer-events:none;user-select:none}
</style>
</head>
<body>

<div class="phone">
  <div class="hd">
    <div class="hd1">TAIWAN EXCLUSIVE</div>
    <div class="hd2">冰箱管家</div>
    <div class="hd3">格點視覺化列表 · 零摩擦家庭共用</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="cold" onclick="switchTab('cold')">冷藏室</div>
    <div class="tab" data-tab="freeze" onclick="switchTab('freeze')">冷凍庫</div>
    <div class="tab" data-tab="door" onclick="switchTab('door')">門片櫃架</div>
  </div>

  <div class="legend">
    <span><i style="background:#4CAF50"></i>安全 >3天</span>
    <span><i style="background:#FFC107"></i>即期 1~3天</span>
    <span><i style="background:#ef476f"></i>過期 ≤0天</span>
  </div>

  <div class="size-bar">
<label>格點大小</label>
<input type="range" id="grid-size" min="2" max="6" value="4" oninput="changeGridSize(this.value)">
<span class="size-val" id="size-val">4</span>
</div>
  <div id="grid-cold" class="grid-wrap active"><div class="grid" id="g-cold"></div></div>
  <div id="grid-freeze" class="grid-wrap"><div class="grid" id="g-freeze"></div></div>
  <div id="grid-door" class="grid-wrap"><div class="grid" id="g-door"></div></div>

  <div class="stats">
    <div class="stat safe"><div class="num" id="stat-safe">0</div><div class="label">安全</div></div>
    <div class="stat warn"><div class="num" id="stat-warn">0</div><div class="label">即期</div></div>
    <div class="stat danger"><div class="num" id="stat-danger">0</div><div class="label">過期</div></div>
    <div class="stat total"><div class="num" id="stat-total">0</div><div class="label">總數</div></div>
  </div>

  <div class="footer-note">點擊格點可新增 / 編輯 / 消耗食材</div>
</div>

<button class="fab" onclick="openAddModal()">+</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">新增食材</h3>
    <div class="form-group">
      <label>食材名稱</label>
      <input type="text" id="m-item" placeholder="例如：鮮奶、高麗菜、雞胸肉">
    </div>
    <div class="form-group">
      <label>區域</label>
      <select id="m-zone">
        <option value="cold">冷藏室</option>
        <option value="freeze">冷凍庫</option>
        <option value="door">門片櫃架</option>
      </select>
    </div>
    <div class="form-group">
      <label>到期日 (留空=自動計算)</label>
      <input type="date" id="m-expiry">
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveItem()">儲存</button>
      <button class="btn btn-danger" id="modal-del-btn" style="display:none" onclick="deleteItem()">刪除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxmoehjgtd4pQH3KayjVQysUakbz1BrRcy9m-0Rn5UwgzceR0S0fh-dnDz12-Muypc/exec";
var currentTab = 'cold', currentGridIndex = 0, currentItemId = '', allItems = [];
var STORAGE_KEY = 'fridge_items_v2';
var gridCols = 4;
const FOOD_DEFAULTS = {"高麗菜": {"cold": 7, "freeze": null}, "空心菜": {"cold": 3, "freeze": null}, "青江菜": {"cold": 4, "freeze": null}, "花椰菜": {"cold": 5, "freeze": null}, "白菜": {"cold": 7, "freeze": null}, "菠菜": {"cold": 5, "freeze": null}, "花瓜": {"cold": 4, "freeze": null}, "苞蔔菜": {"cold": 7, "freeze": null}, "絲絲菜": {"cold": 3, "freeze": null}, "花生芽": {"cold": 5, "freeze": null}, "玉米筍": {"cold": 4, "freeze": null}, "蒜苗": {"cold": 10, "freeze": null}, "蔥": {"cold": 14, "freeze": null}, "薑": {"cold": 14, "freeze": null}, "菇": {"cold": 7, "freeze": null}, "紅蘿蔔": {"cold": 14, "freeze": null}, "黃瓜": {"cold": 10, "freeze": null}, "西瓜": {"cold": 7, "freeze": null}, "豌豆": {"cold": 5, "freeze": null}, "穀類": {"cold": 30, "freeze": 180}, "鮮奶": {"cold": 7, "freeze": 30}, "優酪乳": {"cold": 7, "freeze": 30}, "雞蛋": {"cold": 21, "freeze": null}, "豆腐": {"cold": 5, "freeze": 30}, "豆漿": {"cold": 3, "freeze": 60}, "豆腐皮": {"cold": 7, "freeze": 90}, "臭豆腐": {"cold": 365, "freeze": 365}, "豬肉絲": {"cold": 2, "freeze": 30}, "雞胸肉": {"cold": 2, "freeze": 30}, "緊肉片": {"cold": 2, "freeze": 120}, "牛排": {"cold": 2, "freeze": 90}, "里肌肉": {"cold": 2, "freeze": 90}, "鯖魚": {"cold": 1, "freeze": 90}, "蟹管": {"cold": 1, "freeze": 90}, "蝦子": {"cold": 1, "freeze": 90}, "香腸": {"cold": 14, "freeze": 60}, "貢丸": {"cold": 14, "freeze": 60}, "拉麵": {"cold": 3, "freeze": 90}, "麵條": {"cold": 3, "freeze": 180}, "餐包": {"cold": 3, "freeze": 90}, "沙茶醬": {"cold": 365, "freeze": 365}, "胡椒粉": {"cold": 365, "freeze": 365}, "醬油": {"cold": 365, "freeze": 365}, "奶油": {"cold": 14, "freeze": 120}, "蜜餞": {"cold": 14, "freeze": 180}, "布丁": {"cold": 14, "freeze": 90}, "養樂多": {"cold": 365, "freeze": 365}, "果醬": {"cold": 365, "freeze": 365}, "果凍": {"cold": 7, "freeze": 180}};

/* ====== GRID CONFIG (dynamic cols) ====== */
function getGridConfig(zone) {
  var baseTotals = { cold: 12, freeze: 12, door: 8 };
  var total = baseTotals[zone] || 12;
  var rows = Math.ceil(total / gridCols);
  return { rows: rows, cols: gridCols, total: total };
}

function changeGridSize(val) {
  gridCols = parseInt(val);
  document.getElementById('size-val').textContent = val;
  try { localStorage.setItem('fridge_grid_cols', val); } catch(e) {}
  renderGrid(currentTab);
}

/* ====== LOCAL STORAGE ====== */
function gid() { return 'it_' + Date.now() + '_' + Math.random().toString(36).substr(2,6); }
function saveStorage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allItems)); } catch(e){} }
function loadStorage() {
  try {
    var d = localStorage.getItem(STORAGE_KEY);
    if (d) { allItems = JSON.parse(d); recalcDays(); return true; }
  } catch(e){}
  return false;
}
function recalcDays() {
  var t=new Date(); t.setHours(0,0,0,0);
  for (var i=0;i<allItems.length;i++) {
    if (allItems[i].expiry_date) {
      var e=new Date(allItems[i].expiry_date); e.setHours(0,0,0,0);
      allItems[i].days_left = Math.ceil((e-t)/(86400000));
    }
  }
}

/* ====== CRUD ====== */
function addItem(n,z,idx,exp) {
  var it={id:gid(),item_name:n,storage_zone:z,grid_index:idx,expiry_date:exp,input_date:new Date().toISOString().split('T')[0],status:'在庫',operator_note:'',days_left:null};
  var t=new Date();t.setHours(0,0,0,0); var e=new Date(exp);e.setHours(0,0,0,0);
  it.days_left=Math.ceil((e-t)/(86400000)); allItems.push(it); saveStorage(); renderGrid(currentTab);
}
function updItem(id,n,z,idx,exp){
  for(var i=0;i<allItems.length;i++){if(allItems[i].id===id){
    allItems[i].item_name=n;allItems[i].storage_zone=z;allItems[i].grid_index=idx;allItems[i].expiry_date=exp;
    var t=new Date();t.setHours(0,0,0,0);var e=new Date(exp);e.setHours(0,0,0,0);
    allItems[i].days_left=Math.ceil((e-t)/(86400000));saveStorage();renderGrid(currentTab);return;
  }}
}
function delItem(id){for(var i=0;i<allItems.length;i++){if(allItems[i].id===id){allItems.splice(i,1);saveStorage();renderGrid(currentTab);return;}}}

/* ====== HELPERS ====== */
function getDefExp(name,zone){
  var info=FOOD_DEFAULTS[name];
  if(info&&info[zone]){var d=new Date();d.setDate(d.getDate()+info[zone]);return d.toISOString().split('T')[0];}
  var fb={cold:5,freeze:30,door:14};var d=new Date();d.setDate(d.getDate()+(fb[zone]||7));return d.toISOString().split('T')[0];
}
function getColor(dl){if(dl===null||dl===undefined)return'empty';if(dl<=0)return'red';if(dl<=3)return'yellow';return'green';}

/* ====== DRAG & DROP ====== */
var dragItem = null, dragEl = null, dragStartZone = null, dragStartIdx = null, longPressTimer = null;

function initDrag(cell, item, zone, idx) {
  cell.draggable = true;
  cell.addEventListener('dragstart', function(e) {
    dragItem = item; dragEl = cell; dragStartZone = zone; dragStartIdx = idx;
    cell.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', item.id);
  });
  cell.addEventListener('dragend', function() {
    cell.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(function(el){el.classList.remove('drag-over');});
    dragItem=null;dragEl=null;dragStartZone=null;dragStartIdx=null;
  });
  // Touch long-press for mobile
  var pressTimer = null;
  cell.addEventListener('touchstart', function(e) {
    pressTimer = setTimeout(function() {
      dragItem = item; dragEl = cell; dragStartZone = zone; dragStartIdx = idx;
      cell.classList.add('dragging');
      showToast('拖曳移動到目標格點');
    }, 400);
  }, {passive:true});
  cell.addEventListener('touchend', function() {
    clearTimeout(pressTimer);
  });
  cell.addEventListener('touchmove', function() {
    clearTimeout(pressTimer);
  }, {passive:true});
}

function allowDrop(e) { e.preventDefault(); e.dataTransfer.dropEffect='move'; }

function handleDrop(targetCell, targetZone, targetIdx) {
  if (!dragItem || !dragEl) return;
  // Swap positions
  var targetItem = findItemAt(targetZone, targetIdx);
  if (targetItem && targetItem.id !== dragItem.id) {
    // swap
    var oldZone = dragItem.storage_zone, oldIdx = dragItem.grid_index;
    dragItem.storage_zone = targetZone; dragItem.grid_index = targetIdx;
    targetItem.storage_zone = oldZone; targetItem.grid_index = oldIdx;
  } else if (!targetItem) {
    // move to empty
    dragItem.storage_zone = targetZone; dragItem.grid_index = targetIdx;
  }
  saveStorage();
  renderGrid(currentTab);
  showToast('已移動');
}

/* ====== RENDER ====== */
function renderGrid(zone) {
  var config = getGridConfig(zone);
  var container = document.getElementById('g-' + zone);
  container.style.gridTemplateColumns = 'repeat('+config.cols+',1fr)';
  container.innerHTML = '';
  for (var i = 0; i < config.total; i++) {
    var item = findItemAt(zone, i);
    var cell = document.createElement('div');
    cell.className = 'cell';
    cell.ondragover = function(){this.classList.add('drag-over');return false;};
    cell.ondragleave = function(){this.classList.remove('drag-over');};
    cell.ondrop = (function(z,idx){return function(e){
      e.preventDefault(); this.classList.remove('drag-over'); handleDrop(this,z,idx);
    };})(zone,i);

    if (item) {
      var dl=item.days_left,c=getColor(dl);cell.classList.add(c);
      var h='<div>'+escapeHtml(item.item_name)+'</div>';
      if(dl!==null&&dl!==undefined)h+='<div class="days-badge">'+(dl>0?'+'+dl:dl)+'天</div>';
      h+='<span class="drag-hint">☜</span>';
      cell.innerHTML=h;
      cell.onclick=(function(it){return function(){openEditModal(it);};})(item);
      initDrag(cell,item,zone,i);
    } else {
      cell.classList.add('empty');cell.innerHTML='+';
      cell.onclick=(function(z,idx){return function(){openAddAtZone(z,idx);};})(zone,i);
    }
    container.appendChild(cell);
  }
  updateStats();
}

function findItemAt(zone,gIdx){
  for(var i=0;i<allItems.length;i++)if(allItems[i].storage_zone===zone&&allItems[i].grid_index===gIdx)return allItems[i];
  return null;
}

function updateStats(){
  var s=0,w=0,d=0;
  for(var i=0;i<allItems.length;i++){var c=getColor(allItems[i].days_left);if(c==='green')s++;else if(c==='yellow')w++;else if(c==='red')d++;}
  $('stat-safe').textContent=s;$('stat-warn').textContent=w;$('stat-danger').textContent=d;$('stat-total').textContent=s+w+d;
}
function $(id){return document.getElementById(id);}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelector('[data-tab="'+tab+'"]').classList.add('on');
  document.querySelectorAll('.grid-wrap').forEach(function(g){g.classList.remove('active');});
  $('grid-'+tab).classList.add('active');renderGrid(tab);
}

/* ====== MODAL ====== */
function openAddModal(){currentItemId='';currentGridIndex=getNextEmpty(currentTab);
  $('modal-title').textContent='新增食材';$('m-item').value='';$('m-zone').value=currentTab;$('m-expiry').value='';
  $('modal-del-btn').style.display='none';$('modal-save-btn').onclick=doSave;showModal();}
function openAddAtZone(z,idx){currentGridIndex=idx;currentItemId='';
  $('modal-title').textContent='新增食材';$('m-item').value='';$('m-zone').value=z;$('m-expiry').value='';
  $('modal-del-btn').style.display='none';$('modal-save-btn').onclick=doSave;showModal();}
function openEditModal(it){currentItemId=it.id;currentGridIndex=it.grid_index;
  $('modal-title').textContent='編輯食材';$('m-item').value=it.item_name;$('m-zone').value=it.storage_zone;
  $('m-expiry').value=it.expiry_date?it.expiry_date.split(' ')[0]:'';
  $('modal-del-btn').style.display='';$('modal-save-btn').onclick=doUpdate;showModal();}
function closeModal(){$('modal').classList.remove('show');}
function showModal(){$('modal').classList.add('show');}
function getNextEmpty(zone){var c=getGridConfig(zone);for(var i=0;i<c.total;i++)if(!findItemAt(zone,i))return i;return 0;}
function doSave(){
  var n=$('m-item').value.trim(),z=$('m-zone').value,e=$('m-expiry').value;
  if(!n){showToast('請輸入食材名稱');return;}
  if(!e)e=getDefExp(n,z);addItem(n,z,currentGridIndex,e);closeModal();showToast('儲存成功！');
}
function doUpdate(){
  var n=$('m-item').value.trim(),z=$('m-zone').value,e=$('m-expiry').value;
  if(!n){showToast('請輸入食材名稱');return;}
  if(!e)e=getDefExp(n,z);updItem(currentItemId,n,z,currentGridIndex,e);closeModal();showToast('更新成功！');
}
function doDelete(){if(!confirm('確定刪除？'))return;delItem(currentItemId);closeModal();showToast('已刪除');}
function showToast(msg){var el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2200);}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ====== DEMO (first launch) ====== */
function showDemo(){
