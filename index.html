<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1b4332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="冰箱管家">
<link rel="manifest" href="manifest.json">
<title>冰箱管家</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Microsoft JhengHei","PingFang TC",sans-serif;background:#e8edf2;display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:430px;background:#fff;min-height:100vh;position:relative;overflow-x:hidden}

.hd{background:linear-gradient(160deg,#1a392b 0%,#2d6a4f 50%,#52b788 100%);color:#fff;padding:18px 22px 16px;position:relative;overflow:hidden}
.hd::after{content:"";position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,0.06);border-radius:50%}
.hd1{font-size:10px;opacity:0.7;letter-spacing:2px;text-transform:uppercase}
.hd2{font-size:23px;font-weight:900;margin-top:4px;letter-spacing:1px}
.hd3{font-size:11px;opacity:0.75;margin-top:5px}

.tabs{display:flex;background:linear-gradient(180deg,#e8f5e9 0%,#f0faf1 100%);border-bottom:1px solid #c8e6c9}
.tab{flex:1;text-align:center;padding:12px 0;font-size:13.5px;font-weight:700;color:#6b9080;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s}
.tab.on{color:#1b4332;border-bottom-color:#2d6a4f;background:rgba(255,255,255,0.6)}

.legend{display:flex;justify-content:center;gap:14px;padding:8px 0 4px;font-size:11px;color:#777;background:#fafcfb}
.legend span{display:flex;align-items:center;gap:3px}
.legend i{width:9px;height:9px;border-radius:50%;display:inline-block}

.grid-wrap{padding:10px;display:none}
.grid-wrap.active{display:block}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:4px}
.cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;text-align:center;padding:4px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;word-break:break-all;line-height:1.25;min-height:70px}
.cell:active{transform:scale(0.93)}
.cell.empty{background:#f5f5f5;color:#bbb;border:2px dashed #ddd}
.cell.green{background:linear-gradient(135deg,#d8f3dc,#b7e4c7);color:#1b4332;border:2px solid #95d5b2}
.cell.yellow{background:linear-gradient(135deg,#fff3cd,#ffe69c);color:#664d03;border:2px solid #ffc107}
.cell.red{background:linear-gradient(135deg,#ffccd5,#ffa8b0);color:#900c20;border:2px solid #ef476f}
.cell .days-badge{position:absolute;top:-2px;right:-2px;font-size:9px;font-weight:800;padding:2px 5px;border-radius:8px;color:#fff;min-width:22px;text-align:center}
.cell.green .days-badge{background:#2d6a4f}
.cell.yellow .days-badge{background:#e67700}
.cell.red .days-badge{background:#c1121f}

.stats{display:flex;justify-content:center;gap:16px;padding:10px 0 6px;font-size:12px;color:#555;background:#fafcfb}
.stat{text-align:center}
.stat .num{font-size:22px;font-weight:900}
.stat .label{font-size:10px;color:#888;margin-top:1px}
.stat.safe .num{color:#2d6a4f}
.stat.warn .num{color:#e67700}
.stat.danger .num{color:#c1121f}
.stat.total .num{color:#555}

.footer-note{text-align:center;font-size:10px;color:#aaa;padding:8px 0 14px;background:#fafcfb}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:88%;max-width:340px;padding:24px 20px 20px;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal h3{font-size:18px;margin-bottom:14px;color:#1b4332}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus{border-color:#52b788}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:11px 0;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,#2d6a4f,#52b788);color:#fff}
.btn-danger{background:linear-gradient(135deg,#c1121f,#ef476f);color:#fff}
.btn-cancel{background:#eee;color:#666}
.btn:active{opacity:0.8}

.fab{position:fixed;bottom:20px;right:50%;transform:translateX(215px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#2d6a4f,#52b788);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(45,106,79,0.35);cursor:pointer;z-index:100;border:none;outline:none}
.fab:active{transform:translateX(215px) scale(0.92)}

.loading{text-align:center;padding:40px 0;color:#999;font-size:13px}
.loading .spinner{width:36px;height:36px;border:4px solid #e0e0e0;border-top-color:#52b788;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="phone">
  <div class="hd">
    <div class="hd1">TAIWAN EXCLUSIVE</div>
    <div class="hd2">冰箱管家</div>
    <div class="hd3">格點視覺化列表 · 零摩擦家庭共用</div>
  </div>

  <div class="tabs">
    <div class="tab on" data-tab="cold" onclick="switchTab('cold')">冷藏室</div>
    <div class="tab" data-tab="freeze" onclick="switchTab('freeze')">冷凍庫</div>
    <div class="tab" data-tab="door" onclick="switchTab('door')">門片櫃架</div>
  </div>

  <div class="legend">
    <span><i style="background:#4CAF50"></i>安全 >3天</span>
    <span><i style="background:#FFC107"></i>即期 1~3天</span>
    <span><i style="background:#ef476f"></i>過期 ≤0天</span>
  </div>

  <div id="grid-cold" class="grid-wrap active"><div class="grid" id="g-cold"></div></div>
  <div id="grid-freeze" class="grid-wrap"><div class="grid" id="g-freeze"></div></div>
  <div id="grid-door" class="grid-wrap"><div class="grid" id="g-door"></div></div>

  <div class="stats">
    <div class="stat safe"><div class="num" id="stat-safe">0</div><div class="label">安全</div></div>
    <div class="stat warn"><div class="num" id="stat-warn">0</div><div class="label">即期</div></div>
    <div class="stat danger"><div class="num" id="stat-danger">0</div><div class="label">過期</div></div>
    <div class="stat total"><div class="num" id="stat-total">0</div><div class="label">總數</div></div>
  </div>

  <div class="footer-note">點擊格點可新增 / 編輯 / 消耗食材</div>
</div>

<button class="fab" onclick="openAddModal()">+</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">新增食材</h3>
    <div class="form-group">
      <label>食材名稱</label>
      <input type="text" id="m-item" placeholder="例如：鮮奶、高麗菜、雞胸肉">
    </div>
    <div class="form-group">
      <label>區域</label>
      <select id="m-zone">
        <option value="cold">冷藏室</option>
        <option value="freeze">冷凍庫</option>
        <option value="door">門片櫃架</option>
      </select>
    </div>
    <div class="form-group">
      <label>到期日 (留空=自動計算)</label>
      <input type="date" id="m-expiry">
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveItem()">儲存</button>
      <button class="btn btn-danger" id="modal-del-btn" style="display:none" onclick="deleteItem()">刪除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxmoehjgtd4pQH3KayjVQysUakbz1BrRcy9m-0Rn5UwgzceR0S0fh-dnDz12-Muypc/exec";

var currentTab = 'cold';
var currentGridIndex = 0;
var currentItemId = '';
var allItems = [];

// Taiwan food defaults
const FOOD_DEFAULTS = {"高麗菜": {"cold": 7, "freeze": null}, "空心菜": {"cold": 3, "freeze": null}, "青江菜": {"cold": 4, "freeze": null}, "花椰菜": {"cold": 5, "freeze": null}, "白菜": {"cold": 7, "freeze": null}, "菠菜": {"cold": 5, "freeze": null}, "花瓜": {"cold": 4, "freeze": null}, "苞蔔菜": {"cold": 7, "freeze": null}, "絲絲菜": {"cold": 3, "freeze": null}, "花生芽": {"cold": 5, "freeze": null}, "玉米筍": {"cold": 4, "freeze": null}, "蒜苗": {"cold": 10, "freeze": null}, "蔥": {"cold": 14, "freeze": null}, "薑": {"cold": 14, "freeze": null}, "菇": {"cold": 7, "freeze": null}, "紅蘿蔔": {"cold": 14, "freeze": null}, "黃瓜": {"cold": 10, "freeze": null}, "西瓜": {"cold": 7, "freeze": null}, "豌豆": {"cold": 5, "freeze": null}, "穀類": {"cold": 30, "freeze": 180}, "鮮奶": {"cold": 7, "freeze": 30}, "優酪乳": {"cold": 7, "freeze": 30}, "雞蛋": {"cold": 21, "freeze": null}, "豆腐": {"cold": 5, "freeze": 30}, "豆漿": {"cold": 3, "freeze": 60}, "豆腐皮": {"cold": 7, "freeze": 90}, "臭豆腐": {"cold": 365, "freeze": 365}, "豬肉絲": {"cold": 2, "freeze": 30}, "雞胸肉": {"cold": 2, "freeze": 30}, "緊肉片": {"cold": 2, "freeze": 120}, "牛排": {"cold": 2, "freeze": 90}, "里肌肉": {"cold": 2, "freeze": 90}, "鯖魚": {"cold": 1, "freeze": 90}, "蟹管": {"cold": 1, "freeze": 90}, "蝦子": {"cold": 1, "freeze": 90}, "香腸": {"cold": 14, "freeze": 60}, "貢丸": {"cold": 14, "freeze": 60}, "拉麵": {"cold": 3, "freeze": 90}, "麵條": {"cold": 3, "freeze": 180}, "餐包": {"cold": 3, "freeze": 90}, "沙茶醬": {"cold": 365, "freeze": 365}, "胡椒粉": {"cold": 365, "freeze": 365}, "醬油": {"cold": 365, "freeze": 365}, "奶油": {"cold": 14, "freeze": 120}, "蜜餞": {"cold": 14, "freeze": 180}, "布丁": {"cold": 14, "freeze": 90}, "養樂多": {"cold": 365, "freeze": 365}, "果醬": {"cold": 365, "freeze": 365}, "果凍": {"cold": 7, "freeze": 180}};

// Grid layout per zone
const GRID_CONFIG = {
  cold:   { rows: 3, cols: 4, total: 12 },
  freeze: { rows: 3, cols: 4, total: 12 },
  door:   { rows: 2, cols: 4, total: 8 }
};

function getDefaultExpiry(itemName, zone) {
  var info = FOOD_DEFAULTS[itemName];
  if (info && info[zone]) {
    var d = new Date();
    d.setDate(d.getDate() + info[zone]);
    return d.toISOString().split('T')[0];
  }
  var fallback = { cold: 5, freeze: 30, door: 14 };
  var d = new Date();
  d.setDate(d.getDate() + (fallback[zone] || 7));
  return d.toISOString().split('T')[0];
}

function getColor(daysLeft) {
  if (daysLeft === null || daysLeft === undefined) return 'empty';
  if (daysLeft <= 0) return 'red';
  if (daysLeft <= 3) return 'yellow';
  return 'green';
}

function renderGrid(zone) {
  var config = GRID_CONFIG[zone];
  var container = document.getElementById('g-' + zone);
  container.innerHTML = '';

  for (var i = 0; i < config.total; i++) {
    var item = findItemAt(zone, i);
    var cell = document.createElement('div');
    cell.className = 'cell';

    if (item) {
      var dl = item.days_left;
      var color = getColor(dl);
      cell.classList.add(color);
      var nameSpan = '<div>' + escapeHtml(item.item_name) + '</div>';
      var badge = '';
      if (dl !== null && dl !== undefined) {
        badge = '<div class="days-badge">' + (dl > 0 ? '+' + dl : dl) + '天</div>';
      }
      cell.innerHTML = nameSpan + badge;
      cell.onclick = function(it) { return function() { openEditModal(it); }; }(item);
    } else {
      cell.classList.add('empty');
      cell.innerHTML = '+';
      cell.onclick = function(zn, idx) { return function() { openAddAtZone(zn, idx); }; }(zone, i);
    }
    container.appendChild(cell);
  }
  updateStats();
}

function findItemAt(zone, gridIdx) {
  for (var i = 0; i < allItems.length; i++) {
    if (allItems[i].storage_zone === zone && allItems[i].grid_index === gridIdx && allItems[i].status !== '已消耗' && allItems[i].status !== '已刪除') {
      return allItems[i];
    }
  }
  return null;
}

function updateStats() {
  var safe = 0, warn = 0, danger = 0;
  for (var i = 0; i < allItems.length; i++) {
    var it = allItems[i];
    if (it.status === '已消耗' || it.status === '已刪除') continue;
    var c = getColor(it.days_left);
    if (c === 'green') safe++;
    else if (c === 'yellow') warn++;
    else if (c === 'red') danger++;
  }
  document.getElementById('stat-safe').textContent = safe;
  document.getElementById('stat-warn').textContent = warn;
  document.getElementById('stat-danger').textContent = danger;
  document.getElementById('stat-total').textContent = safe + warn + danger;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('on'); });
  document.querySelector('[data-tab="' + tab + '"]').classList.add('on');
  document.querySelectorAll('.grid-wrap').forEach(function(g) { g.classList.remove('active'); });
  document.getElementById('grid-' + tab).classList.add('active');
  renderGrid(tab);
}

function openAddModal() {
  currentItemId = '';
  currentGridIndex = getNextEmptyGrid(currentTab);
  document.getElementById('modal-title').textContent = '新增食材';
  document.getElementById('m-item').value = '';
  document.getElementById('m-zone').value = currentTab;
  document.getElementById('m-expiry').value = '';
  document.getElementById('modal-del-btn').style.display = 'none';
  document.getElementById('modal-save-btn').onclick = saveItem;
  showModal();
}

function openAddAtZone(zone, idx) {
  currentGridIndex = idx;
  currentItemId = '';
  document.getElementById('modal-title').textContent = '新增食材';
  document.getElementById('m-item').value = '';
  document.getElementById('m-zone').value = zone;
  document.getElementById('m-expiry').value = '';
  document.getElementById('modal-del-btn').style.display = 'none';
  document.getElementById('modal-save-btn').onclick = saveItem;
  showModal();
}

function openEditModal(item) {
  currentItemId = item.id;
  currentGridIndex = item.grid_index;
  document.getElementById('modal-title').textContent = '編輯食材';
  document.getElementById('m-item').value = item.item_name;
  document.getElementById('m-zone').value = item.storage_zone;
  document.getElementById('m-expiry').value = item.expiry_date ? item.expiry_date.split(' ')[0] : '';
  document.getElementById('modal-del-btn').style.display = '';
  document.getElementById('modal-save-btn').onclick = updateItem;
  showModal();
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }
function showModal() { document.getElementById('modal').classList.add('show'); }

function getNextEmptyGrid(zone) {
  var config = GRID_CONFIG[zone];
  for (var i = 0; i < config.total; i++) {
    if (!findItemAt(zone, i)) return i;
  }
  return 0;
}

function saveItem() {
  var itemName = document.getElementById('m-item').value.trim();
  var zone = document.getElementById('m-zone').value;
  var expiry = document.getElementById('m-expiry').value;
  if (!itemName) { showToast('請輸入食材名稱'); return; }
  if (!expiry) { expiry = getDefaultExpiry(itemName, zone); }
  sendToGAS({ action: 'add', item_name: itemName, storage_zone: zone, grid_index: currentGridIndex, expiry_date: expiry });
  closeModal();
}

function updateItem() {
  var itemName = document.getElementById('m-item').value.trim();
  var zone = document.getElementById('m-zone').value;
  var expiry = document.getElementById('m-expiry').value;
  if (!itemName) { showToast('請輸入食材名稱'); return; }
  if (!expiry) { expiry = getDefaultExpiry(itemName, zone); }
  sendToGAS({ action: 'update', id: currentItemId, item_name: itemName, storage_zone: zone, grid_index: currentGridIndex, expiry_date: expiry });
  closeModal();
}

function deleteItem() {
  if (!confirm('確定刪除這項食材？')) return;
  sendToGAS({ action: 'delete', id: currentItemId });
  closeModal();
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2200);
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* GAS Communication */
function loadData() {
  fetch(GAS_URL + '?action=list&callback=handleData', { method: 'GET' })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      try {
        // Try to extract JSON from response
        var jsonStart = text.indexOf('{');
        var jsonEnd = text.lastIndexOf('}');
        if (jsonStart >= 0 && jsonEnd > jsonStart) {
          var data = JSON.parse(text.substring(jsonStart, jsonEnd + 1));
          handleData(data);
          return;
        }
      } catch(e) {}
      showLoading(false);
      showDemoData();
    })
    .catch(function(err) {
      console.log('Load error:', err);
      showLoading(false);
      showDemoData();
    });
}

function handleData(data) {
  showLoading(false);
  if (data && data.items) {
    allItems = data.items;
  } else if (Array.isArray(data)) {
    allItems = data;
  }
  renderGrid(currentTab);
}

function sendToGAS(payload) {
  showToast('儲存中...');
  var form = new FormData();
  for (var key in payload) { form.append(key, payload[key]); }

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: form
  }).then(function() {
    showToast('儲存成功！');
    setTimeout(function() { loadData(); }, 800);
  }).catch(function(err) {
    showToast('儲存失敗，請檢查網路');
    console.error(err);
  });
}

function showLoading(show) {}

function showDemoData() {
  var now = new Date();
  function dayOffset(n) { var d = new Date(now); d.setDate(d.getDate() + n); return d.toISOString().split('T')[0]; }

  allItems = [
    { id: 'd1', item_name: '鮮奶', storage_zone: 'cold', grid_index: 0, expiry_date: dayOffset(5), status: '在庫', days_left: 5 },
    { id: 'd2', item_name: '高麗菜', storage_zone: 'cold', grid_index: 1, expiry_date: dayOffset(2), status: '在庫', days_left: 2 },
    { id: 'd3', item_name: '雞蛋', storage_zone: 'cold', grid_index: 2, expiry_date: dayOffset(-1), status: '在庫', days_left: -1 },
    { id: 'd4', item_name: '豆腐', storage_zone: 'cold', grid_index: 3, expiry_date: dayOffset(4), status: '在庫', days_left: 4 },
    { id: 'd5', item_name: '雞胸肉', storage_zone: 'cold', grid_index: 4, expiry_date: dayOffset(1), status: '在庫', days_left: 1 },
    { id: 'd6', item_name: '黃瓜', storage_zone: 'cold', grid_index: 5, expiry_date: dayOffset(8), status: '在庫', days_left: 8 },
    { id: 'd7', item_name: '緊肉片', storage_zone: 'freeze', grid_index: 0, expiry_date: dayOffset(25), status: '在庫', days_left: 25 },
    { id: 'd8', item_name: '鯖魚', storage_zone: 'freeze', grid_index: 1, expiry_date: dayOffset(60), status: '在庫', days_left: 60 },
    { id: 'd9', item_name: '蝴蝶麵', storage_zone: 'freeze', grid_index: 2, expiry_date: dayOffset(3), status: '在庫', days_left: 3 },
    { id: 'd10', item_name: '香腸', storage_zone: 'door', grid_index: 0, expiry_date: dayOffset(10), status: '在庫', days_left: 10 },
    { id: 'd11', item_name: '沙茶醬', storage_zone: 'door', grid_index: 1, expiry_date: dayOffset(300), status: '在庫', days_left: 300 },
    { id: 'd12', item_name: '奶酪', storage_zone: 'door', grid_index: 2, expiry_date: dayOffset(45), status: '在庫', days_left: 45 }
  ];
  renderGrid(currentTab);
}

/* Init */
if (!GAS_URL) { showDemoData(); } else { loadData(); }
</script>
</body>
</html>
